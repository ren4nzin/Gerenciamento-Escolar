<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
	<link rel="stylesheet" href="/css/instyle.css">
    <title>Educação - Turmas</title>
</head>
<body>

    <h1>Cadastro de Turmas</h1>
<div class="container">
    <input type="text" id="nome" placeholder="Nome">
    <input type="number" id="ano" placeholder="Ano">
	<input type="number" id="semestre" placeholder="Semestre">
    <button onclick="cadastrar()">Cadastrar</button>

    <h2>Lista de Turmas</h2>
    <ul id="lista"></ul>
</div>
    <script>
        const API = "http://localhost:8080/turmas";

        function validarAno(){
		
			let ano = document.getElementById("ano").value;
				if (ano <=2000 || ano >=2050) {
				alert("Por favor, insira um ano válido.");
				return false; // Impede o envio do formulário
			}
			return true;
		}
        //tentei usar && mas não funcionou troquei para || e funcionou kkkkk
        function carregarTurmas() {
            fetch(API)
                .then(res => res.json())
                .then(data => {
                    const lista = document.getElementById("lista");
                    lista.innerHTML = "";

                    data.forEach(turma => {
                        const li = document.createElement("li");
                        li.innerHTML = `
                            ${turma.nome} - Ano: ${turma.ano} - semestre ${turma.semestre}
                            <button onclick="deletar(${turma.id})">Excluir</button>
                        `;
                        lista.appendChild(li);
                    });
                });
        }

        function cadastrar() {
            const nome = document.getElementById("nome").value;
            const ano = document.getElementById("ano").value;
			const semestre = document.getElementById("semestre").value;
			
				if (!validarAno()) {
					return; // para tudo se for inválido
				}

            fetch(API, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ nome, ano ,semestre})
            }).then(() => {
                carregarTurmas();
            });
        }

        function deletar(id) {
            fetch(`${API}/${id}`, {
                method: "DELETE"
            }).then(() => {
                carregarTurmas();
            });
        }

        // Carregar ao abrir
        carregarTurmas();
		
    </script>

</body>
</html>
