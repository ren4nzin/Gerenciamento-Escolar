<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
	<link rel="stylesheet" href="/css/instyle.css">
    <title>Educação - Turmas</title>
</head>
<body>

    <h1>Cadastro de Turmas</h1>
<div class="container">
    <input type="text" id="nome" placeholder="Nome">
    <input type="number" id="ano" placeholder="Ano">
    <button onclick="cadastrar()">Cadastrar</button>

    <h2>Lista de Turmas</h2>
    <ul id="lista"></ul>
</div>
    <script>
        const API = "http://localhost:8080/turmas";

        function carregarTurmas() {
            fetch(API)
                .then(res => res.json())
                .then(data => {
                    const lista = document.getElementById("lista");
                    lista.innerHTML = "";

                    data.forEach(turma => {
                        const li = document.createElement("li");
                        li.innerHTML = `
                            ${turma.nome} - Ano: ${turma.ano}
                            <button onclick="deletar(${turma.id})">Excluir</button>
                        `;
                        lista.appendChild(li);
                    });
                });
        }

        function cadastrar() {
            const nome = document.getElementById("nome").value;
            const ano = document.getElementById("ano").value;

            fetch(API, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ nome, ano })
            }).then(() => {
                carregarTurmas();
            });
        }

        function deletar(id) {
            fetch(`${API}/${id}`, {
                method: "DELETE"
            }).then(() => {
                carregarTurmas();
            });
        }

        // Carregar ao abrir
        carregarTurmas();
		
    </script>

</body>
</html>
