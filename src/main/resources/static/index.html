<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
	<link rel="stylesheet" href="/css/instyle.css">
    <title>Educação - Alunos</title>
</head>
<body>
    <h1>Cadastro de Alunos</h1>
<div class="container">
    <input type="text" id="nome" placeholder="Nome">
    <input type="number" id="nota" placeholder="Nota">
	 <input type="text" id="cpf" placeholder="CPf">
	<select id="turma"></select>
	<!-- Turma é um objeto  -->
    <button onclick="cadastrar()">Cadastrar</button>
    <h2>Lista de Alunos</h2>
    <ul id="lista"></ul>
    </div>
    <script>
        const API = "http://localhost:8080/alunos";
        function validarnota(){
		//valida se a nota não é negativa
			let nota = document.getElementById("nota").value;
				if (nota <=0) {
				alert("Por favor, insira uma nota válida.");
				return false; // Impede o envio do formulário
			}
			return true;
		}
        function carregarAlunos() {
            fetch(API)
                .then(res => res.json())
                .then(data => {
                    const lista = document.getElementById("lista");
                    lista.innerHTML = "";
                    data.forEach(aluno => {
                        const li = document.createElement("li");
                        li.innerHTML = `
                            ${aluno.nome} - Nota: ${aluno.nota}${aluno.cpf} - Turma: ${aluno.turma?.nome} 
                            <button onclick="deletar(${aluno.id})">Excluir</button>
                        `;
                        lista.appendChild(li);
                    });
                });
        }
		<!--Funcaõ que carrega as turmas cadastradas no banco de dados para selecionar -->
		function carregarTurmas() {
    fetch("http://localhost:8080/turmas")
        .then(res => res.json())
        .then(data => {
            const select = document.getElementById("turma");

            // opção padrão
            select.innerHTML = '<option value="">Selecione a turma</option>';

            data.forEach(turma => {
                const option = document.createElement("option");
                option.value = turma.id;       // envia o ID
                option.textContent = turma.nome; // mostra o nome da turma
                select.appendChild(option);
            });
        });
        }
			<!--Funcão que cadastra e valida-->
        function cadastrar() {
            const nome = document.getElementById("nome").value;
            const nota = document.getElementById("nota").value;
			const cpf = document.getElementById("cpf").value;
			const turmaId = document.getElementById("turma").value;
         

				if (!validarnota()) {
				return; // para tudo se for inválido
				}
            fetch(API, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                 nome: nome,
				 nota: parseFloat(nota),
				 turma: {
                id: parseInt(turmaId)
            }
				})
            }).then(() => {
                carregarAlunos();
            });
        }
        function deletar(id) {
            fetch(`${API}/${id}`, {
                method: "DELETE"
            }).then(() => {
                carregarAlunos();
            });
        }
		
		
        // Carregar ao abrir
        carregarAlunos();	
		carregarTurmas();
    </script>
    </body>
    </html>
